name: CI

env:
  PYTHONUTF8: "1"

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install -e ".[test]"
      - run: python -m ruff check --config pyproject.toml --exclude training .
      - run: python -m pytest
      - run: python evaluation/evidence_memory_benchmark.py --mode smoke --output "${{ runner.temp }}/medilife-smoke.json"
      - run: python -m build
      - run: python -m pip install --force-reinstall dist/*.whl
        if: runner.os == 'Linux'
      - run: python -c "from core.skill_loader import discover_skills; from knowledge.resources import bundled_knowledge_db; assert len(discover_skills()) == 9; assert bundled_knowledge_db().is_file()"
        if: runner.os == 'Linux'
      - run: medilife --help
        if: runner.os == 'Linux'
