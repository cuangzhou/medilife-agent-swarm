name: Release candidate

env:
  PYTHONUTF8: "1"

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[test,release]"
      - run: python -m pytest
      - run: python -m pip_audit
      - run: python -m build
      - run: cyclonedx-py environment -o sbom.json
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"
      - uses: actions/upload-artifact@v4
        with:
          name: medilife-0.3.0-release-candidate
          path: |
            dist/*
            sbom.json
