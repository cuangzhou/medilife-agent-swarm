name: Training static validation

on:
  push:
    paths: ["training/**", ".github/workflows/training-ci.yml"]
  pull_request:
    paths: ["training/**", ".github/workflows/training-ci.yml"]

env:
  PYTHONUTF8: "1"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install pyyaml
      - run: python -m compileall -q training
      - run: python training/scripts/validate_distribution.py
      - run: find training -type f -name '*.sh' -print0 | xargs -0 -n1 bash -n

